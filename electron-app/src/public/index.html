<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Politicagem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="newspaper">
      <div class="top-rule"></div>
      <div class="top-rule-thin"></div>

      <header class="masthead">
        <div class="masthead-title">Politicagem</div>
        <div class="masthead-subtitle">Agregador de Noticias da Imprensa Progressista</div>
        <div class="masthead-dateline">
          <span>Edicao desktop em Electron</span>
          <span id="dateline-date"></span>
          <span id="news-count">Numero 0</span>
        </div>
      </header>

      <form class="controls" id="search-form">
        <label for="busca">Pesquisar:</label>
        <input type="text" name="busca" id="busca" placeholder="Palavra-chave..." />
        <button type="submit">Consultar</button>
        <button type="button" id="channels-toggle" class="btn-secondary">Canais</button>
      </form>

      <section id="channels-panel" class="channels-panel" style="display:none">
        <div class="channels-header">Gerenciar canais RSS</div>

        <form id="channel-form" class="channel-form">
          <input type="text" id="channel-name" placeholder="Nome do canal" required />
          <input type="url" id="channel-url" placeholder="https://site.com/feed" required />
          <button type="submit">Adicionar canal</button>
        </form>

        <div id="channel-error" class="channel-error" style="display:none"></div>
        <div id="channel-list" class="channel-list"></div>
      </section>

      <div class="stats-bar" id="stats-bar">Carregando noticias...</div>

      <section id="headline"></section>
      <section id="list"></section>

      <footer class="footer">
        O Diario Nacional - Aggregador de Noticias - Actualizado a cada edicao
      </footer>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
