<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noticia RSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="viewer-container">
      <div class="top-rule"></div>
      <div class="top-rule-thin"></div>

      <div class="viewer-header">
        <img id="rss-image" class="viewer-image" style="display:none" alt="Imagem da materia" />
        <h1 id="rss-title"></h1>
        <p id="rss-subtitle" class="viewer-subtitle" style="display:none"></p>
        <div class="viewer-meta-row">
          <span class="source-tag" id="rss-source"></span>
          <span class="date-info" id="rss-date"></span>
        </div>
      </div>

      <div class="viewer-controls">
        <a class="btn btn-secondary" href="/">Voltar</a>
        <a class="btn" id="original-link" target="_blank" rel="noreferrer">Abrir no site original</a>
      </div>

      <div class="viewer-content">
        <div id="rss-loading">Carregando materia completa...</div>
        <div id="rss-error" class="content-error" style="display:none"></div>
        <article id="rss-content" class="content-text"></article>
      </div>
    </div>

    <script src="/rss-viewer.js"></script>
  </body>
</html>
