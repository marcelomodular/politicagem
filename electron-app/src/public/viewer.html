<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="viewer-container">
      <div class="top-rule"></div>
      <div class="top-rule-thin"></div>

      <div class="viewer-header">
        <img id="article-image" class="viewer-image" style="display:none" alt="Imagem da materia" />
        <h1 id="viewer-title"></h1>
        <div class="source-tag" id="viewer-source"></div>
      </div>

      <div class="viewer-controls">
        <a class="btn btn-secondary" href="/">Voltar</a>
        <a class="btn" id="original-link" target="_blank" rel="noreferrer">Abrir site original</a>
      </div>

      <div class="viewer-content">
        <div id="loading">Extraindo conteudo da noticia...</div>
        <div id="content" class="content-text" style="display:none"></div>
        <div id="error" class="content-error" style="display:none"></div>
      </div>
    </div>

    <script src="/viewer.js"></script>
  </body>
</html>
